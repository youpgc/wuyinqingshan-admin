<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>雾隐青山 - 管理后台</title>
  <script type="text/javascript">
    // GitHub Pages SPA 路由处理
    var l = window.location;
    var basePath = '/wuyinqingshan-admin';
    
    // 如果路径不是以 basePath 开头，重定向到 basePath
    if (!l.pathname.startsWith(basePath)) {
      window.location.replace(l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') + basePath + '/#' + l.pathname + l.search + l.hash);
    }
  </script>
</head>
<body>
  <h1>页面加载中...</h1>
</body>
</html>
